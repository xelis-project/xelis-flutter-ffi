on:
  pull_request:
  push:
    branches:
      - master

name: Test Example Plugin

jobs:
  Build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        build_mode:
          - debug
          - release
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev ninja-build cmake
      - name: Pub Get
        run: flutter pub get
        working-directory: example
      - name: Build Linux (${{ matrix.build_mode }})
        if: matrix.os == 'ubuntu-latest'
        run: flutter build linux --${{ matrix.build_mode }} -v
        working-directory: example
      - name: Build macOS (${{ matrix.build_mode }})
        if: matrix.os == 'macos-latest'
        run: flutter build macos --${{ matrix.build_mode }} -v
        working-directory: example
      - name: Build iOS (${{ matrix.build_mode }})
        if: matrix.os == 'macos-latest'
        run: flutter build ios --${{ matrix.build_mode }} --no-codesign -v
        working-directory: example
      - name: Build Windows (${{ matrix.build_mode }})
        if: matrix.os == 'windows-latest'
        run: flutter build windows --${{ matrix.build_mode }} -v
        working-directory: example
      - name: Build Android (${{ matrix.build_mode }})
        run: flutter build apk --${{ matrix.build_mode }} -v
        working-directory: example

