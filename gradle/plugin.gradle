import java.nio.file.Paths
import org.apache.tools.ant.taskdefs.condition.Os

CargoKitPlugin.file = buildscript.sourceFile

apply plugin: CargoKitPlugin

class CargoKitExtension {
    String manifestDir // Relative path to folder containing Cargo.toml
    String libname     // Library name within Cargo.toml. Must be a cdylib
}

abstract class CargoKitBuildTask extends DefaultTask {

    @Input
    String buildMode

    @Input
    String buildDir

    @Input
    String outputDir

    @Input
    String ndkVersion

    @Input
    String sdkDirectory

    @Input
    int compileSdkVersion

    @Input
    int minSdkVersion

    @Input
    String pluginFile

    @Input
    List<String> targetPlatforms

    @TaskAction
    def build() {
        if (project.cargokit.manifestDir == null) {
            throw new GradleException("Property 'manifestDir' must be set on cargokit extension")
        }

        if (project.cargokit.libname == null) {
            throw new GradleException("Property 'libname' must be set on cargokit extension")
        }

        def executableName = Os.isFamily(Os.FAMILY_WINDOWS) ? "run_build_tool.cmd" : "run_build_tool.sh"
        def path = Paths.get(new File(pluginFile).parent, "..", executableName)

        def manifestDir = Paths.get(project.buildscript.sourceFile.parent, project.cargokit.manifestDir)
        def rootProjectDir = project.rootProject.projectDir

        if (!Os.isFamily(Os.FAMILY_WINDOWS)) {
            project.exec {
                commandLine 'chmod', '+x', path
            }
        }

        project.exec {
            executable path
            args "build-gradle"
            environment "CARGOKIT_ROOT_PROJECT_DIR", rootProjectDir
            environment "CARGOKIT_TOOL_TEMP_DIR", "${buildDir}/build_tool"
            environment "CARGOKIT_MANIFEST_DIR", manifestDir
            environment "CARGOKIT_CONFIGURATION", buildMode
            environment "CARGOKIT_TARGET_TEMP_DIR", buildDir
            environment "CARGOKIT_OUTPUT_DIR", outputDir
            environment "CARGOKIT_NDK_VERSION", ndkVersion
            environment "CARGOKIT_SDK_DIR", sdkDirectory
            environment "CARGOKIT_COMPILE_SDK_VERSION", compileSdkVersion
            environment "CARGOKIT_MIN_SDK_VERSION", minSdkVersion
            environment "CARGOKIT_TARGET_PLATFORMS", targetPlatforms.join(",")
            environment "CARGOKIT_JAVA_HOME", System.properties['java.home']
        }
    }
}

class CargoKitPlugin implements Plugin<Project> {

    static String file

    private Plugin findFlutterPlugin(Project rootProject) {
        _findFlutterPlugin(rootProject.childProjects)
    }

    /**
     * Try to find the Flutter plugin by class name, supporting both old and new
     * Flutter Gradle layouts.
     */
    private Plugin _findFlutterPlugin(Map projects) {
        for (entry in projects) {
            def proj = entry.value
            for (plugin in proj.plugins) {
                def name = plugin.class.name
                if (name == "com.flutter.gradle.FlutterPlugin" ||
                    name == "FlutterPlugin") {
                    return plugin
                }
            }
            def nested = _findFlutterPlugin(proj.childProjects)
            if (nested != null) {
                return nested
            }
        }
        return null
    }

    @Override
    void apply(Project project) {
        // Always create the extension so users can configure it even if plugin resolution fails
        project.extensions.create("cargokit", CargoKitExtension)

        def flutterPlugin = findFlutterPlugin(project.rootProject)

        // Decide which Android project we treat as the "host" app/library.
        Project hostProject = null
        if (flutterPlugin != null) {
            hostProject = flutterPlugin.project
        } else {
            // Fallback for newer Flutter / plugin-loader layouts:
            // pick the first Android application project (usually :app)
            hostProject = project.rootProject.subprojects.find {
                it.plugins.hasPlugin("com.android.application")
            }
            if (hostProject != null) {
                println "CargoKit: Flutter plugin not found; using ${hostProject.path} as host Android app."
            }
        }

        if (hostProject == null) {
            println "CargoKit: Flutter plugin not found and no Android application project; CargoKit plugin will not be applied."
            return
        }

        def androidExt = hostProject.extensions.findByName("android")
        if (androidExt == null) {
            println "CargoKit: Host project ${hostProject.path} has no Android extension; CargoKit plugin will not be applied."
            return
        }

        def cargoBuildDir = "${project.buildDir}/build"

        // Determine if the host project is an application or a library.
        def isApplication = hostProject.plugins.hasPlugin("com.android.application")
        def variants = isApplication ? androidExt.applicationVariants : androidExt.libraryVariants

        variants.all { variant ->
            final String buildType = variant.buildType.name

            def cargoOutputDir = "${project.buildDir}/jniLibs/${buildType}"
            def jniLibs = project.android.sourceSets.maybeCreate(buildType).jniLibs
            jniLibs.srcDir(new File(cargoOutputDir))

            // Determine target platforms in a way that works across Flutter versions.
            List<String> platforms
            try {
                // Newer API (post 9b878b): static utility
                platforms = com.flutter.gradle.FlutterPluginUtils
                        .getTargetPlatforms(hostProject)
                        .collect()
            } catch (Throwable ignored) {
                // Older API: plugin instance exposes getTargetPlatforms()
                if (flutterPlugin != null &&
                        flutterPlugin.metaClass.respondsTo(flutterPlugin, "getTargetPlatforms")) {
                    platforms = flutterPlugin.getTargetPlatforms().collect()
                } else {
                    // Final fallback: assume common Android targets
                    platforms = ["android-arm", "android-arm64"]
                }
            }

            // Same behavior as addFlutterDependencies in flutter.gradle
            if (buildType == "debug") {
                platforms.add("android-x86")
                platforms.add("android-x64")
            }

            // Delay task creation until the project is fully evaluated.
            project.getGradle().afterProject { p ->
                if (p != project) return

                def taskName = "cargokitCargoBuild${project.cargokit.libname.capitalize()}${buildType.capitalize()}"
                if (project.tasks.findByName(taskName)) {
                    return
                }

                def ndkVersionValue = androidExt.ndkVersion
                if (ndkVersionValue == null) {
                    throw new GradleException(
                        "Please set 'android.ndkVersion' in '${hostProject.path}/build.gradle'."
                    )
                }

                // Handle both "android-34" and "34" styles for compileSdkVersion
                def compileSdkStr = androidExt.compileSdkVersion?.toString()
                if (compileSdkStr == null) {
                    throw new GradleException(
                        "android.compileSdkVersion must be set on host project (${hostProject.path})."
                    )
                }
                int compileSdkInt
                if (compileSdkStr.startsWith("android-")) {
                    compileSdkInt = Integer.parseInt(compileSdkStr.substring("android-".length()))
                } else {
                    compileSdkInt = Integer.parseInt(compileSdkStr)
                }

                def minSdkInt = androidExt.defaultConfig.minSdkVersion.apiLevel as int

                def task = project.tasks.create(taskName, CargoKitBuildTask) {
                    buildMode = variant.buildType.name
                    buildDir = cargoBuildDir
                    outputDir = cargoOutputDir
                    ndkVersion = ndkVersionValue
                    sdkDirectory = androidExt.sdkDirectory
                    minSdkVersion = minSdkInt
                    compileSdkVersion = compileSdkInt
                    targetPlatforms = platforms
                    pluginFile = CargoKitPlugin.file
                }

                def onTask = { newTask ->
                    if (newTask.name == "merge${buildType.capitalize()}NativeLibs") {
                        newTask.dependsOn task
                        // Fix Gradle 7.4.2+ not picking up JNI library changes
                        newTask.outputs.upToDateWhen { false }
                    }
                }
                project.tasks.each onTask
                project.tasks.whenTaskAdded onTask
            }
        }
    }
}
